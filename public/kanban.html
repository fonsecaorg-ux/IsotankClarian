<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a1628">
  <title>CEINSPEC — Kanban</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-bg:         #f3f2f1;
      --color-surface:    #ffffff;
      --color-sidebar:    #ffffff;
      --color-border:     #edebe9;
      --color-text:       #323130;
      --color-text-muted: #605e5c;
      --color-primary:    #0a1628;
      --color-primary-hover: #13294b;
      --color-accent:     #f2c200;
      --color-badge-pendente-bg:  #fff4ce;
      --color-badge-pendente-txt: #835c00;
      --color-badge-gerado-bg:    #dce6f7;
      --color-badge-gerado-txt:   #0078d4;
      --color-badge-assinado-bg:  #dff6dd;
      --color-badge-assinado-txt: #107c10;
      --bg: var(--color-bg); --surface: var(--color-surface); --card: var(--color-surface); --border: var(--color-border); --accent: var(--color-primary);
      --text: var(--color-text); --muted: var(--color-text-muted); --warn: #835c00; --info: #13294b; --success: #107c10; --danger: #a80000;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { padding: 14px; max-width: 1600px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .title { color: var(--accent); font-size: 22px; font-weight: 800; }
    .actions { display: flex; gap: 8px; align-items: center; }
    .btn { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; }
    .btn.accent { border-color: var(--accent); color: var(--accent); }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo {
      width: auto;
      height: 40px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--border);
      padding: 4px 8px;
    }
    .meta { font-size: 12px; color: var(--muted); }
    .filters { display: grid; grid-template-columns: 1fr 220px 160px 160px; gap: 8px; margin-bottom: 12px; }
    input, select { width: 100%; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); padding: 0 10px; }
    .board { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; align-items: start; }
    .col { border: 1px solid var(--border); border-radius: 10px; background: var(--card); min-height: 65vh; display: flex; flex-direction: column; }
    .col-head { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 12px; }
    .col-head.EM_INSPECAO { color: #835c00; }
    .col-head.AGUARDANDO_APROVACAO { color: #13294b; }
    .col-head.CONCLUIDO { color: #107c10; }
    .col-count { font-size: 11px; color: var(--muted); }
    .col-body { padding: 8px; display: grid; gap: 8px; min-height: 120px; }
    .col-body.drag-over { outline: 2px dashed var(--accent); outline-offset: -6px; border-radius: 8px; }
    .card { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); padding: 8px; cursor: grab; }
    .card.dragging { opacity: .45; }
    .card-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
    .card-line { font-size: 12px; color: var(--text); margin-bottom: 2px; }
    .card-muted { font-size: 11px; color: var(--muted); }
    .status-badge { display: inline-block; margin-top: 4px; font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 999px; }
    .status-badge.EM_INSPECAO { color: #835c00; background: #fff4ce; }
    .status-badge.AGUARDANDO_APROVACAO { color: #13294b; background: #dce6f7; }
    .status-badge.CONCLUIDO { color: #107c10; background: #dff6dd; }
    .status-badge.PENDENTE_ASSINATURA { color: #9a3412; background: #ffedd5; }
    .status-badge.ASSINADO_DIGITALMENTE { color: #0b5c0b; background: #dff6dd; }
    .msg { margin-top: 8px; font-size: 12px; color: var(--danger); min-height: 18px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; padding: 12px; z-index: 50; }
    .modal-bg.active { display: flex; }
    .modal { width: min(980px, 100%); max-height: 90vh; overflow: auto; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .modal.laudo-detail-modal {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: 90vh;
    }
    .modal.laudo-detail-modal .laudo-detail-head {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .modal.laudo-detail-modal .laudo-detail-head .modal-title { margin-bottom: 0; }
    .modal.laudo-detail-modal .laudo-detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .modal.laudo-detail-modal #detailContent {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
    .modal-title { color: var(--accent); font-size: 16px; font-weight: 800; }
    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .kv { border: 1px solid var(--border); border-radius: 8px; padding: 8px; background: var(--surface); font-size: 12px; }
    .kv b { color: var(--accent); display: block; margin-bottom: 4px; }
    .audit-item { border: 1px solid var(--border); border-radius: 8px; padding: 8px; margin-bottom: 8px; font-size: 12px; background: var(--surface); }
    .photos-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin-top: 8px; }
    .photo-cell { border: 1px solid var(--border); border-radius: 8px; background: #faf9f8; padding: 6px; }
    .photo-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; min-height: 28px; }
    .photo-thumb { width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; background: #fff; }
    .photo-placeholder { width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; border: 1px dashed var(--border); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:24px; background:#f3f2f1; }
    .lightbox-img { max-width: min(90vw, 1000px); max-height: 80vh; border-radius: 10px; border: 1px solid var(--border); background: #000; }
    .lightbox-toolbar { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; }
    @media (max-width: 767px) {
      .actions { width: 100%; }
      .actions .btn { flex: 1; text-align: center; }
      .filters { grid-template-columns: 1fr; }
      .board {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 6px;
      }
      .col { min-width: 86vw; min-height: auto; }
      .grid2 { grid-template-columns: 1fr; }
      .photos-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 768px) and (max-width: 1024px) {
      .filters { grid-template-columns: 1fr 1fr; }
      .board { grid-template-columns: repeat(3, minmax(260px, 1fr)); overflow-x: auto; }
    }
    @media (min-width: 768px) and (max-width: 1100px) {
      .filters { grid-template-columns: 1fr; }
      .board { grid-template-columns: 1fr; }
      .col { min-height: auto; }
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="/logo-ceinspec.png" alt="CEINSPEC">
        <div>
        <h1 class="title">Kanban de Laudos</h1>
        <p class="meta" id="sessionMeta">Carregando sessão...</p>
        </div>
      </div>
      <div class="actions">
        <span class="meta" id="updatedAt">Atualizado às --:--</span>
        <button class="btn" id="btnRefresh">Atualizar</button>
        <a href="/painel-admin#laudos" class="btn">Laudos</a>
        <a href="/dashboard" class="btn">Dashboard</a>
        <a href="/painel-admin#usuarios" class="btn">Usuários</a>
        <a href="/painel-admin#configuracoes" class="btn">Configurações</a>
        <a href="/equipamentos" class="btn">Isotanks</a>
        <a href="/clientes" class="btn">Clientes</a>
        <a href="/painel-admin#documentos" class="btn">Documentos</a>
        <a href="/" class="btn">Voltar ao formulário</a>
        <button class="btn accent" id="btnLogout">Sair</button>
      </div>
    </header>

    <section class="filters">
      <input type="text" id="searchInput" placeholder="Buscar por isotank ou cliente">
      <select id="inspetorFilter"><option value="">Todos os inspetores</option></select>
      <input type="date" id="dateStart">
      <input type="date" id="dateEnd">
    </section>

    <section class="board">
      <article class="col" data-status="EM_INSPECAO">
        <header class="col-head EM_INSPECAO"><span>Em Inspeção</span><span class="col-count" id="countEmInspecao">0</span></header>
        <div class="col-body" id="colEmInspecao"></div>
      </article>
      <article class="col" data-status="AGUARDANDO_APROVACAO">
        <header class="col-head AGUARDANDO_APROVACAO"><span>Aguardando Aprovação</span><span class="col-count" id="countAguardando">0</span></header>
        <div class="col-body" id="colAguardando"></div>
      </article>
      <article class="col" data-status="CONCLUIDO">
        <header class="col-head CONCLUIDO"><span>Concluído</span><span class="col-count" id="countConcluido">0</span></header>
        <div class="col-body" id="colConcluido"></div>
      </article>
    </section>

    <p class="msg" id="errorMsg"></p>
  </div>

  <div class="modal-bg" id="detailModalBg">
    <div class="modal laudo-detail-modal">
      <div class="laudo-detail-head">
        <h2 class="modal-title">Detalhe do Laudo</h2>
        <div class="laudo-detail-actions">
          <button type="button" class="btn" id="detailBtnEditLaudo" title="Corrigir dados do formulário (fotos não mudam)">Editar laudo</button>
          <button type="button" class="btn accent" id="detailBtnReprocessPdf">Reprocessar PDF</button>
          <button type="button" class="btn" id="closeDetailModal">Fechar</button>
        </div>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <div class="modal-bg" id="lightboxBg">
    <div class="modal" style="width:auto;max-width:95vw;">
      <div class="lightbox-toolbar">
        <button class="btn" id="lightboxPrev">‹ Anterior</button>
        <button class="btn" id="lightboxClose">Fechar</button>
        <button class="btn" id="lightboxNext">Próxima ›</button>
      </div>
      <img id="lightboxImg" class="lightbox-img" alt="Foto do laudo">
    </div>
  </div>

  <script>
    'use strict';

    const PHOTO_ORDER = [
      { campo: 'foto_frontal', label: 'Frontal' },
      { campo: 'foto_traseira', label: 'Traseira' },
      { campo: 'foto_lateral1', label: 'Lateral 1' },
      { campo: 'foto_lateral2', label: 'Lateral 2' },
      { campo: 'foto_superior', label: 'Superior' },
      { campo: 'foto_termometro', label: 'Termômetro' },
      { campo: 'foto_tampa_boca_visita', label: 'Tampa Boca de Visita' },
      { campo: 'foto_valvula_alivio', label: 'Válvula de Alívio' },
      { campo: 'foto_valvula_descarga', label: 'Válvula de Descarga' },
      { campo: 'foto_placa_identificacao', label: 'Placa de Identificação' },
    ];
    const state = {
      user: null,
      laudos: [],
      filtered: [],
      currentDetailId: null,
      currentDetail: null,
      detailLaudoId: null,
      dragOrigin: null,
      timer: null,
      galleryPhotos: [],
      galleryIndex: 0,
    };

    const el = {
      sessionMeta: document.getElementById('sessionMeta'),
      updatedAt: document.getElementById('updatedAt'),
      btnRefresh: document.getElementById('btnRefresh'),
      btnLogout: document.getElementById('btnLogout'),
      searchInput: document.getElementById('searchInput'),
      inspetorFilter: document.getElementById('inspetorFilter'),
      dateStart: document.getElementById('dateStart'),
      dateEnd: document.getElementById('dateEnd'),
      errorMsg: document.getElementById('errorMsg'),
      colEmInspecao: document.getElementById('colEmInspecao'),
      colAguardando: document.getElementById('colAguardando'),
      colConcluido: document.getElementById('colConcluido'),
      countEmInspecao: document.getElementById('countEmInspecao'),
      countAguardando: document.getElementById('countAguardando'),
      countConcluido: document.getElementById('countConcluido'),
      detailModalBg: document.getElementById('detailModalBg'),
      detailContent: document.getElementById('detailContent'),
      closeDetailModal: document.getElementById('closeDetailModal'),
      detailBtnEditLaudo: document.getElementById('detailBtnEditLaudo'),
      detailBtnReprocessPdf: document.getElementById('detailBtnReprocessPdf'),
      lightboxBg: document.getElementById('lightboxBg'),
      lightboxImg: document.getElementById('lightboxImg'),
      lightboxPrev: document.getElementById('lightboxPrev'),
      lightboxNext: document.getElementById('lightboxNext'),
      lightboxClose: document.getElementById('lightboxClose'),
    };

    function escapeHtml(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /** Rótulo amigável para enum LaudoStatus (API + AuditLog). */
    function laudoStatusLabel(s) {
      const m = {
        EM_INSPECAO: 'Em Inspeção',
        AGUARDANDO_APROVACAO: 'Aguardando Aprovação',
        PENDENTE_ASSINATURA: 'Pendente assinatura (inspetor gov.br)',
        ASSINADO_DIGITALMENTE: 'Assinado digitalmente',
        CONCLUIDO: 'Concluído',
      };
      return m[s] || s || '-';
    }

    function hasInspectorPdf(l) {
      return Boolean(l && (l.inspectorSignedAt || l.inspectorSignedFileName));
    }
    function hasEngineerPdf(l) {
      return Boolean(l && (l.signedAt || l.signedFileName));
    }
    /** Indica de quem falta a assinatura digital (gov.br). */
    function laudoStatusDisplay(laudo) {
      if (!laudo) return '-';
      const s = laudo.status;
      if (s === 'PENDENTE_ASSINATURA') {
        return 'Pendente assinatura — inspetor (gov.br)';
      }
      if (s === 'AGUARDANDO_APROVACAO') {
        if (hasInspectorPdf(laudo) && !hasEngineerPdf(laudo)) {
          return 'Aguardando aprovação — falta engenheiro (gov.br)';
        }
        if (!hasInspectorPdf(laudo)) {
          return 'Aguardando aprovação — falta inspetor (gov.br)';
        }
        return 'Aguardando aprovação';
      }
      return laudoStatusLabel(s);
    }

    function kanbanBucket(status) {
      if (status === 'EM_INSPECAO') return 'EM_INSPECAO';
      if (status === 'CONCLUIDO') return 'CONCLUIDO';
      return 'AGUARDANDO_APROVACAO';
    }

    function canDragKanbanStatus(s) {
      return s === 'EM_INSPECAO' || s === 'AGUARDANDO_APROVACAO' || s === 'CONCLUIDO';
    }

    function fmtDate(v) {
      if (!v) return '-';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString('pt-BR');
    }

    function timeAgo(v) {
      if (!v) return '-';
      const now = new Date();
      const d = new Date(v);
      const diffMs = now - d;
      const mins = Math.floor(diffMs / 60000);
      if (mins < 60) return `há ${mins} min`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `há ${hours} h`;
      const days = Math.floor(hours / 24);
      return `há ${days} dia${days > 1 ? 's' : ''}`;
    }

    async function api(path, options = {}) {
      const res = await fetch(path, { credentials: 'include', ...options });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    async function checkAdminAccess() {
      const res = await fetch('/auth/me', { credentials: 'include' });
      if (res.status === 401) { window.location.replace('/login'); return false; }
      if (!res.ok) throw new Error('Falha ao validar sessão');
      const payload = await res.json();
      state.user = payload.user;
      if (state.user.role !== 'ADMIN') { window.location.replace('/'); return false; }
      el.sessionMeta.textContent = `${state.user.nome} (${state.user.role})`;
      return true;
    }

    function renderInspetorFilter() {
      const names = [...new Set(state.laudos.map((l) => l.createdBy?.nome).filter(Boolean))].sort();
      const current = el.inspetorFilter.value;
      el.inspetorFilter.innerHTML = '<option value="">Todos os inspetores</option>' + names.map((n) => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
      if (names.includes(current)) el.inspetorFilter.value = current;
    }

    function applyFilters() {
      const q = el.searchInput.value.trim().toLowerCase();
      const inspetor = el.inspetorFilter.value;
      const start = el.dateStart.value ? new Date(`${el.dateStart.value}T00:00:00`) : null;
      const end = el.dateEnd.value ? new Date(`${el.dateEnd.value}T23:59:59`) : null;

      state.filtered = state.laudos.filter((l) => {
        const text = `${l.numeroIdentificacao || ''} ${l.cliente || ''}`.toLowerCase();
        const mQ = !q || text.includes(q);
        const mI = !inspetor || (l.createdBy?.nome === inspetor);
        const d = l.dataInspecao ? new Date(l.dataInspecao) : null;
        const mS = !start || (d && d >= start);
        const mE = !end || (d && d <= end);
        return mQ && mI && mS && mE;
      });
    }

    function createCard(laudo) {
      const card = document.createElement('article');
      card.className = 'card';
      const drag = canDragKanbanStatus(laudo.status);
      card.draggable = drag;
      /* Sempre clicável (abre detalhe). grab só quando arrastar colunas faz sentido. */
      card.style.cursor = drag ? 'grab' : 'pointer';
      card.dataset.id = laudo.id;
      card.dataset.status = laudo.status;
      card.innerHTML = `
        <div class="card-title">${escapeHtml(laudo.numeroIdentificacao || 'Sem isotank')}</div>
        <div class="card-line">${escapeHtml(laudo.cliente || '-')}</div>
        <div class="card-muted">Inspetor: ${escapeHtml(laudo.createdBy?.nome || '-')}</div>
        <div class="card-muted">Inspeção: ${fmtDate(laudo.dataInspecao)}</div>
        <div class="card-muted">${timeAgo(laudo.updatedAt || laudo.createdAt)}</div>
        <span class="status-badge ${escapeHtml(laudo.status)}">${escapeHtml(laudoStatusDisplay(laudo))}</span>
      `;

      card.addEventListener('dragstart', () => {
        if (!canDragKanbanStatus(laudo.status)) return;
        state.dragOrigin = { id: laudo.id, status: laudo.status };
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.addEventListener('click', () => openDetailModal(laudo.id));
      return card;
    }

    function renderBoard() {
      el.colEmInspecao.innerHTML = '';
      el.colAguardando.innerHTML = '';
      el.colConcluido.innerHTML = '';

      const byStatus = { EM_INSPECAO: [], AGUARDANDO_APROVACAO: [], CONCLUIDO: [] };
      state.filtered.forEach((l) => {
        const b = kanbanBucket(l.status);
        byStatus[b].push(l);
      });

      byStatus.EM_INSPECAO.forEach((l) => el.colEmInspecao.appendChild(createCard(l)));
      byStatus.AGUARDANDO_APROVACAO.forEach((l) => el.colAguardando.appendChild(createCard(l)));
      byStatus.CONCLUIDO.forEach((l) => el.colConcluido.appendChild(createCard(l)));

      el.countEmInspecao.textContent = String(byStatus.EM_INSPECAO.length);
      el.countAguardando.textContent = String(byStatus.AGUARDANDO_APROVACAO.length);
      el.countConcluido.textContent = String(byStatus.CONCLUIDO.length);
    }

    function updateUpdatedAt() {
      const now = new Date();
      el.updatedAt.textContent = `Atualizado às ${now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
    }

    async function loadLaudos() {
      el.errorMsg.textContent = '';
      state.laudos = await api('/laudos');
      renderInspetorFilter();
      applyFilters();
      renderBoard();
      updateUpdatedAt();
    }

    async function moveCard(laudoId, toStatus) {
      await api(`/laudos/${laudoId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: toStatus }),
      });

      const local = state.laudos.find((l) => l.id === laudoId);
      if (local) {
        local.status = toStatus;
        local.updatedAt = new Date().toISOString();
      }
      applyFilters();
      renderBoard();
    }

    function renderPhotoGallery(fotos, laudoId) {
      const byCampo = new Map((fotos || []).map((f) => [f.campo, f]));
      const ordered = PHOTO_ORDER.map((item) => {
        const foto = byCampo.get(item.campo);
        return foto ? { ...foto, expectedLabel: item.label } : { campo: item.campo, expectedLabel: item.label };
      });

      state.galleryPhotos = ordered.filter((f) => f && f.id).map((f) => ({
        src: `/laudos/${laudoId}/fotos/${f.id}`,
        label: f.label || f.expectedLabel || f.campo,
      }));

      return `
        <h3 style="font-size:14px;color:var(--accent);margin:12px 0 8px;">Registro Fotográfico</h3>
        <div class="photos-grid">
          ${ordered.map((f) => {
            if (f.id) {
              const idx = state.galleryPhotos.findIndex((p) => p.src.endsWith(`/${f.id}`));
              return `
                <div class="photo-cell">
                  <div class="photo-label">${escapeHtml(f.label || f.expectedLabel || f.campo)}</div>
                  <img class="photo-thumb" data-photo-index="${idx}" src="/laudos/${laudoId}/fotos/${f.id}" alt="${escapeHtml(f.label || f.expectedLabel || f.campo)}">
                </div>
              `;
            }
            return `
              <div class="photo-cell">
                <div class="photo-label">${escapeHtml(f.expectedLabel || f.campo)}</div>
                <div class="photo-placeholder" title="Foto não enviada">📷</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function updateLightbox() {
      if (!state.galleryPhotos.length) return;
      const current = state.galleryPhotos[state.galleryIndex];
      el.lightboxImg.src = current.src;
      el.lightboxImg.alt = current.label;
    }

    function openLightbox(index) {
      if (!state.galleryPhotos.length) return;
      state.galleryIndex = index < 0 ? 0 : (index >= state.galleryPhotos.length ? 0 : index);
      updateLightbox();
      el.lightboxBg.classList.add('active');
    }

    function closeLightbox() {
      el.lightboxBg.classList.remove('active');
    }

    function renderLaudoEditForm(detail) {
      const id = detail.id;
      const entries = Object.entries(detail.formData || {}).sort(([a], [b]) => a.localeCompare(b));
      const fields = entries.map(([k, v]) => {
        const raw = v == null ? '' : (typeof v === 'object' ? JSON.stringify(v) : String(v));
        const long = raw.length > 140 || /conclusao|recomendacao/i.test(k);
        const input = long
          ? `<textarea data-form-key="${escapeHtml(k)}" rows="4" style="width:100%;font:inherit;box-sizing:border-box;padding:8px;border:1px solid var(--border);border-radius:6px;">${escapeHtml(raw)}</textarea>`
          : `<input data-form-key="${escapeHtml(k)}" type="text" value="${escapeHtml(raw)}" style="width:100%;font:inherit;box-sizing:border-box;padding:8px;border:1px solid var(--border);border-radius:6px;">`;
        return `<div class="edit-field" style="margin-bottom:12px;">
          <label style="display:block;font-weight:700;font-size:12px;margin-bottom:4px;color:var(--text);">${escapeHtml(k)}</label>
          ${input}
        </div>`;
      }).join('');
      return `
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.45;">
          Corrija os dados do formulário. As <strong>fotos</strong> deste laudo não são alteradas aqui.
          Ao salvar, assinaturas digitais anteriores e o PDF em cache são limpos — use <strong>Reprocessar PDF</strong> em seguida.
        </p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
          <button type="button" class="btn accent" data-detail-action="save-edit" data-id="${escapeHtml(id)}">Salvar alterações</button>
          <button type="button" class="btn" data-detail-action="cancel-edit" data-id="${escapeHtml(id)}">Cancelar</button>
        </div>
        <div style="max-height:58vh;overflow:auto;border:1px solid var(--border);border-radius:8px;padding:12px;background:#faf9f8;">
          ${fields || '<p>Sem dados de formulário para editar.</p>'}
        </div>
      `;
    }

    function collectFormDataFromEdit(rootEl) {
      const inputs = rootEl.querySelectorAll('[data-form-key]');
      const out = {};
      inputs.forEach((el) => {
        const k = el.getAttribute('data-form-key');
        if (!k) return;
        const raw = el.value;
        const t = raw.trim();
        if ((t.startsWith('{') && t.endsWith('}')) || (t.startsWith('[') && t.endsWith(']'))) {
          try {
            out[k] = JSON.parse(t);
            return;
          } catch (_) {
            out[k] = raw;
            return;
          }
        }
        if (/^-?\d+(\.\d+)?$/.test(t)) {
          const n = Number(raw);
          if (!Number.isNaN(n) && String(n) === t) {
            out[k] = n;
            return;
          }
        }
        out[k] = raw;
      });
      return out;
    }

    async function saveLaudoFormEdit(laudoId) {
      const formData = collectFormDataFromEdit(el.detailContent);
      await api(`/laudos/${laudoId}/form-data`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ formData }),
      });
      el.errorMsg.textContent = '';
      await loadLaudos();
      await openDetailModal(laudoId);
    }

    function closeKanbanDetailModal() {
      el.detailModalBg.classList.remove('active');
      state.currentDetailId = null;
      state.detailLaudoId = null;
      state.currentDetail = null;
    }

    async function openDetailModal(laudoId, opts = {}) {
      const openInEdit = Boolean(opts && opts.edit);
      try {
        state.currentDetailId = laudoId;
        const detail = await api(`/laudos/${laudoId}`);
        let fotos = [];
        try {
          fotos = await api(`/laudos/${laudoId}/fotos`);
        } catch (_) {
          fotos = [];
        }

        const formEntries = Object.entries(detail.formData || {}).map(([k, v]) => `
          <div class="kv"><b>${escapeHtml(k)}</b>${escapeHtml(v)}</div>
        `).join('');

        const auditActionLabel = (action) => {
          if (action === 'LAUDO_FORM_UPDATED') return 'Dados do laudo alterados (admin)';
          return action || '—';
        };

        const auditEntries = (detail.auditLogs || []).map((a) => `
          <div class="audit-item">
            <b>${escapeHtml(auditActionLabel(a.action))}</b><br>
            De: ${escapeHtml(laudoStatusLabel(a.fromStatus))} → Para: ${escapeHtml(laudoStatusLabel(a.toStatus))}<br>
            Por: ${escapeHtml(a.user?.nome || 'Sistema')}<br>
            Em: ${fmtDate(a.createdAt)}
          </div>
        `).join('') || '<p>Nenhuma movimentação registrada.</p>';

        state.currentDetail = detail;
        state.detailLaudoId = laudoId;

        const viewHtml = `
          <div class="grid2" style="margin-bottom:10px;">
            <div class="kv"><b>ID</b>${escapeHtml(detail.id)}</div>
            <div class="kv"><b>Status</b><span class="status-badge ${escapeHtml(detail.status)}">${escapeHtml(laudoStatusDisplay(detail))}</span></div>
            <div class="kv"><b>Isotank</b>${escapeHtml(detail.numeroIdentificacao || '-')}</div>
            <div class="kv"><b>Cliente</b>${escapeHtml(detail.cliente || '-')}</div>
            <div class="kv"><b>Inspetor</b>${escapeHtml(detail.createdBy?.nome || '-')}</div>
            <div class="kv"><b>Data da inspeção</b>${fmtDate(detail.dataInspecao)}</div>
          </div>
          <h3 style="font-size:14px;color:var(--accent);margin:8px 0;">Campos do Formulário</h3>
          <div class="grid2">${formEntries || '<p>Sem dados.</p>'}</div>
          <h3 style="font-size:14px;color:var(--accent);margin:12px 0 8px;">Histórico de Movimentações</h3>
          ${auditEntries}
          ${renderPhotoGallery(fotos, laudoId)}
        `;

        el.detailContent.innerHTML = openInEdit ? renderLaudoEditForm(detail) : viewHtml;
        el.detailModalBg.classList.add('active');
      } catch (err) {
        el.errorMsg.textContent = err.message;
      }
    }

    async function reprocessCurrentDetail() {
      if (!state.currentDetailId) return;
      const res = await fetch(`/laudos/${state.currentDetailId}/pdf`, { method: 'POST', credentials: 'include' });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Erro ao reprocessar' }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const blob = await res.blob();
      const cdHeader = res.headers.get('Content-Disposition') || '';
      const match = cdHeader.match(/filename="([^"]+)"/);
      const filename = match ? match[1] : `LAUDO_${state.currentDetailId}.pdf`;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      await loadLaudos();
      await openDetailModal(state.currentDetailId);
    }

    function setupDnD() {
      document.querySelectorAll('.col-body').forEach((colBody) => {
        colBody.addEventListener('dragover', (ev) => {
          ev.preventDefault();
          colBody.classList.add('drag-over');
        });
        colBody.addEventListener('dragleave', () => colBody.classList.remove('drag-over'));
        colBody.addEventListener('drop', async (ev) => {
          ev.preventDefault();
          colBody.classList.remove('drag-over');
          if (!state.dragOrigin) return;

          const toStatus = colBody.id === 'colEmInspecao' ? 'EM_INSPECAO' : (colBody.id === 'colAguardando' ? 'AGUARDANDO_APROVACAO' : 'CONCLUIDO');
          const { id, status: fromStatus } = state.dragOrigin;
          state.dragOrigin = null;
          if (toStatus === fromStatus) return;

          try {
            await moveCard(id, toStatus);
          } catch (err) {
            el.errorMsg.textContent = err.message;
            await loadLaudos();
          }
        });
      });
    }

    el.searchInput.addEventListener('input', () => { applyFilters(); renderBoard(); });
    el.inspetorFilter.addEventListener('change', () => { applyFilters(); renderBoard(); });
    el.dateStart.addEventListener('change', () => { applyFilters(); renderBoard(); });
    el.dateEnd.addEventListener('change', () => { applyFilters(); renderBoard(); });
    el.btnRefresh.addEventListener('click', async () => { try { await loadLaudos(); } catch (err) { el.errorMsg.textContent = err.message; } });
    el.btnLogout.addEventListener('click', async () => {
      try { await fetch('/auth/logout', { method: 'POST', credentials: 'include' }); } catch (_) {}
      window.location.replace('/login');
    });
    el.detailContent.addEventListener('click', (ev) => {
      const actionBtn = ev.target.closest('[data-detail-action]');
      if (actionBtn) {
        const action = actionBtn.dataset.detailAction;
        const id = actionBtn.dataset.id;
        if (!id) return;
        if (action === 'cancel-edit') {
          void openDetailModal(id);
          return;
        }
        if (action === 'save-edit') {
          void (async () => {
            try {
              el.errorMsg.textContent = '';
              await saveLaudoFormEdit(id);
            } catch (err) {
              el.errorMsg.textContent = err.message;
            }
          })();
          return;
        }
      }
      const idxRaw = ev.target?.dataset?.photoIndex;
      if (idxRaw == null) return;
      const idx = Number(idxRaw);
      if (Number.isNaN(idx)) return;
      openLightbox(idx);
    });
    el.closeDetailModal.addEventListener('click', closeKanbanDetailModal);
    el.detailModalBg.addEventListener('click', (ev) => { if (ev.target === el.detailModalBg) closeKanbanDetailModal(); });
    el.lightboxClose.addEventListener('click', closeLightbox);
    el.lightboxBg.addEventListener('click', (ev) => { if (ev.target === el.lightboxBg) closeLightbox(); });
    el.lightboxPrev.addEventListener('click', () => {
      if (!state.galleryPhotos.length) return;
      state.galleryIndex = (state.galleryIndex - 1 + state.galleryPhotos.length) % state.galleryPhotos.length;
      updateLightbox();
    });
    el.lightboxNext.addEventListener('click', () => {
      if (!state.galleryPhotos.length) return;
      state.galleryIndex = (state.galleryIndex + 1) % state.galleryPhotos.length;
      updateLightbox();
    });
    el.detailBtnEditLaudo.addEventListener('click', () => {
      const d = state.currentDetail;
      const id = state.detailLaudoId;
      if (!d || !id || d.id !== id) {
        el.errorMsg.textContent = 'Abra um laudo no quadro (clique no cartão) para editar.';
        return;
      }
      el.errorMsg.textContent = '';
      el.detailContent.innerHTML = renderLaudoEditForm(d);
    });

    el.detailBtnReprocessPdf.addEventListener('click', async () => {
      try {
        el.errorMsg.textContent = '';
        await reprocessCurrentDetail();
      } catch (err) {
        el.errorMsg.textContent = err.message;
      }
    });

    (async () => {
      try {
        const ok = await checkAdminAccess();
        if (!ok) return;
        setupDnD();
        await loadLaudos();
        state.timer = setInterval(async () => {
          try { await loadLaudos(); } catch (_) {}
        }, 30000);
      } catch (_) {
        window.location.replace('/login');
      }
    })();
  </script>
  <script src="/change-password.js"></script>
</body>
</html>
