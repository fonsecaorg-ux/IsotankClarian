<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0a1628">
  <title>CEINSPEC — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-bg:         #f3f2f1;
      --color-surface:    #ffffff;
      --color-sidebar:    #ffffff;
      --color-border:     #edebe9;
      --color-text:       #323130;
      --color-text-muted: #605e5c;
      --color-primary:    #0078d4;
      --color-primary-hover: #106ebe;
      --color-badge-pendente-bg:  #fff4ce;
      --color-badge-pendente-txt: #835c00;
      --color-badge-gerado-bg:    #dce6f7;
      --color-badge-gerado-txt:   #0078d4;
      --color-badge-assinado-bg:  #dff6dd;
      --color-badge-assinado-txt: #107c10;
      --danger: #ef4444;
      --radius: 10px;
    }

    body {
      min-height: 100dvh;
      background-image:
        linear-gradient(rgba(15,30,60,0.75), rgba(15,30,60,0.75)),
        url('/images/bg_login.jpg');
      background-size: cover;
      background-position: center;
      color: var(--color-text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      position: relative;
    }

    .login-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .06);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .logo {
      width: min(250px, 75%);
      height: auto;
      display: block;
    }

    h1 {
      font-size: 18px;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 12px;
      margin-bottom: 16px;
    }

    .login-center {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cesari-logo {
      width: 120px;
      filter: brightness(0) invert(1);
      display: block;
      margin: 0 auto 20px auto;
    }
    .footer-note {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      width: calc(100% - 24px);
      pointer-events: none;
    }

    .field { margin-bottom: 12px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--color-text-muted);
      font-size: 12px;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
      color: var(--color-text);
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.2);
    }

    .btn {
      width: 100%;
      height: 42px;
      border-radius: 8px;
      border: 0;
      background: var(--color-primary);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn:disabled {
      opacity: .7;
      cursor: not-allowed;
    }
    .btn:hover:not(:disabled) { background: var(--color-primary-hover); }

    .error {
      min-height: 18px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 12px;
      text-align: center;
    }
    @media (max-width: 768px) {
      .card { width: 90%; max-width: 400px; padding: 16px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-center">
      <img src="/images/logo_cesari.png" alt="Cesari" class="cesari-logo">
      <main class="card">
      <div class="logo-wrap">
        <img src="/logo-ceinspec.png" alt="CEINSPEC" class="logo">
      </div>
      <h1>Acesso ao sistema</h1>
      <p class="subtitle">Laudo Visual — Isotank</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="btnLogin">Entrar</button>
        <p class="error" id="loginError"></p>
      </form>
    </main>
    </div>
  </div>
  <p class="footer-note">Desenvolvido pela Célula Inovação - SI · 2026</p>

  <script>
    'use strict';

    const form = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const loginError = document.getElementById('loginError');
    const LOGIN_LOCK_KEY = 'ceinspec_login_lock_until';
    const LOGIN_LOCK_MS = 15 * 60 * 1000;
    let lockTimer = null;

    function formatRemaining(ms) {
      const total = Math.max(0, Math.ceil(ms / 1000));
      const minutes = Math.floor(total / 60);
      const seconds = total % 60;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function getLockUntil() {
      const raw = localStorage.getItem(LOGIN_LOCK_KEY);
      if (!raw) return null;
      const value = Number(raw);
      if (!Number.isFinite(value)) return null;
      return value;
    }

    function clearLoginLock() {
      localStorage.removeItem(LOGIN_LOCK_KEY);
      if (lockTimer) {
        clearInterval(lockTimer);
        lockTimer = null;
      }
      btnLogin.disabled = false;
    }

    function startLockCountdown(untilTimestamp) {
      if (lockTimer) clearInterval(lockTimer);
      const tick = () => {
        const remaining = untilTimestamp - Date.now();
        if (remaining <= 0) {
          clearLoginLock();
          loginError.textContent = '';
          return;
        }
        btnLogin.disabled = true;
        loginError.textContent = `Muitas tentativas. Tente novamente em ${formatRemaining(remaining)}`;
      };
      tick();
      lockTimer = setInterval(tick, 1000);
    }

    function applyStoredLockIfAny() {
      const lockUntil = getLockUntil();
      if (lockUntil && lockUntil > Date.now()) {
        startLockCountdown(lockUntil);
      } else {
        clearLoginLock();
      }
    }

    async function checkCurrentSession() {
      try {
        const res = await fetch('/auth/me', {
          method: 'GET',
          credentials: 'include',
        });

        if (res.ok) {
          const data = await res.json();
          const role = data.role ?? data.user?.role;
          if (role === 'ADMIN') {
            window.location.href = '/painel-admin';
          } else {
            window.location.href = '/';
          }
        }
      } catch (_) {
        // Se falhar a checagem, mantém na tela de login.
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      loginError.textContent = '';

      const email = form.email.value.trim().toLowerCase();
      const password = form.password.value;

      if (!email || !password) {
        loginError.textContent = 'Preencha e-mail e senha.';
        return;
      }

      const lockUntil = getLockUntil();
      if (lockUntil && lockUntil > Date.now()) {
        startLockCountdown(lockUntil);
        return;
      }

      btnLogin.disabled = true;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password }),
        });

        if (res.status === 401) {
          loginError.textContent = 'E-mail ou senha inválidos';
          return;
        }

        if (res.status === 429) {
          const untilTimestamp = Date.now() + LOGIN_LOCK_MS;
          localStorage.setItem(LOGIN_LOCK_KEY, String(untilTimestamp));
          startLockCountdown(untilTimestamp);
          return;
        }

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Erro no login' }));
          loginError.textContent = err.error || 'Erro ao autenticar';
          return;
        }

        const data = await res.json();
        // POST /auth/login retorna { user: { role, ... } }; data.role cobre respostas alternativas
        const role = data.role ?? data.user?.role;
        if (role === 'ADMIN') {
          window.location.href = '/painel-admin';
        } else {
          window.location.href = '/';
        }
      } catch (_) {
        loginError.textContent = 'Não foi possível conectar ao servidor';
      } finally {
        const activeLockUntil = getLockUntil();
        if (!activeLockUntil || activeLockUntil <= Date.now()) {
          btnLogin.disabled = false;
        }
      }
    });

    applyStoredLockIfAny();
    checkCurrentSession();
  </script>
</body>
</html>
